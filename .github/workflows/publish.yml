name: Quarto Publish

on:
  workflow_dispatch:
  push:
    branches: main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
    
      - name: Install R
        uses: r-lib/actions/setup-r@v2
      
      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          extra-packages: |
            any::rcmdcheck
          packages: blob, DBI, dbplyr, docxtractr, downlit, dplyr, DT, eulerr, flextable, ggplot2, ggthemes, glue, grid, gridExtra, here, infer, janeaustenr, janitor, kableExtra, knitr, lubridate, microbenchmark, NHSRdatasets, palmerpenguins, plotly, purrr, quarto, readr, readxl, renv, repurrrsive, reticulate, rmarkdown, rmeta, RSQLite, scales, shiny, sigmoid, skimr, snakecase, stopwords, stringdist, stringr, testthat, tibble, tidyr, tidytext, writexl, xml2
          extra-packages: github::nes-dew/kindr

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        
      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}